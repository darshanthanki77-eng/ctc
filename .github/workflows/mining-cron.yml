name: Mining Cron (Direct)

on:
  schedule:
    - cron: '0 0,12 * * 1-5'
  workflow_dispatch:

jobs:
  run-mining-cron:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd server && npm ci

      - name: Run mining cron directly
        env:
          MONGODB_URL: ${{ secrets.MONGODB_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          NODE_ENV: production
        run: |
          cd server
          node -e "
          (async () => {
            console.log('============================================');
            console.log('[CRON] Starting at:', new Date().toISOString());
            console.log('============================================');
            
            const { runMiningCronCycle } = require('./cron/miningCron');
            require('dotenv').config();
            
            console.log('[1/4] Loading mongoose...');
            const mongoose = require('mongoose');
            
            console.log('[2/4] Connecting to MongoDB...');
            await mongoose.connect(process.env.MONGODB_URL);
            console.log('[2/4] MongoDB connected');
            
            console.log('[3/4] Running mining cron...');
            const result = await runMiningCronCycle(false);
            
            console.log('[4/4] Result:', JSON.stringify(result, null, 2));
            
            if (result.success) {
              console.log('[CRON] ✅ Cron completed successfully');
              process.exit(0);
            } else {
              console.log('[CRON] ⚠️ Result:', result.reason);
              process.exit(0);
            }
          })().catch(err => {
            console.error('[CRON] ❌ Fatal error:', err.message);
            console.error(err.stack);
            process.exit(1);
          });
          "
